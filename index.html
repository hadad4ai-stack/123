<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>نموذج محلي · Local LLM</title>
  <meta name="description" content="تطبيق محادثة يشغّل نماذج ذكاء اصطناعي محلياً في المتصفح مع دعم الأدوات والمهارات." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0b16" />

  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="نموذج محلي" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="menuBtn" class="icon-btn" aria-label="القائمة">☰</button>
      <div class="title">
        <strong id="activeSkillName">محادثة عامة</strong>
        <span id="modelStatus" class="status">لم يُحمَّل النموذج</span>
      </div>
      <button id="newChatBtn" class="icon-btn" aria-label="محادثة جديدة">＋</button>
    </header>

    <!-- Drawer / settings -->
    <aside id="drawer" class="drawer" hidden>
      <div class="drawer-inner">
        <h2>الإعدادات</h2>

        <label class="field">
          <span>تعليمات النظام (System Prompt) — تُطبَّق قبل تشغيل النموذج</span>
          <textarea id="systemPrompt" rows="4"
            placeholder="اكتب هنا التعليمات التي يجب أن يلتزم بها النموذج بأقصى درجة…"></textarea>
        </label>
        <button id="saveSystemBtn" class="primary" style="margin-bottom:18px">حفظ التعليمات</button>

        <label class="field">
          <span>النموذج</span>
          <select id="modelSelect"></select>
        </label>

        <button id="loadModelBtn" class="primary">تحميل النموذج</button>
        <div id="loadProgress" class="progress" hidden>
          <div class="bar"><div id="loadBar"></div></div>
          <small id="loadText"></small>
        </div>

        <h3>المهارات (Skills)</h3>
        <div id="skillsList" class="skills"></div>

        <h3>الأدوات (Tools)</h3>
        <div id="toolsList" class="tools-list"></div>

        <label class="field switch-field">
          <span>التحدث بصوت مسموع (TTS)</span>
          <input type="checkbox" id="ttsToggle" />
        </label>

        <button id="clearChatBtn" class="danger">مسح المحادثة الحالية</button>

        <p class="hint">
          يعمل النموذج بالكامل داخل متصفحك عبر WebGPU — لا تُرسل بياناتك لأي خادم.
          أول تحميل يجلب ملفات النموذج (مئات الميجابايت) ثم يُخزَّن للاستخدام دون إنترنت.
        </p>
      </div>
    </aside>
    <div id="scrim" class="scrim" hidden></div>

    <main id="messages" class="messages" aria-live="polite"></main>

    <form id="composer" class="composer">
      <textarea id="input" rows="1" placeholder="اكتب رسالتك…" autocomplete="off"></textarea>
      <button id="sendBtn" type="submit" class="send" aria-label="إرسال" disabled>↑</button>
    </form>
  </div>

  <!-- App as ES modules -->
  <script type="module" src="js/app.js"></script>
  <script>
    // register service worker for offline / installability
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(console.warn);
      });
    }
  </script>
</body>
</html>
